<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg2: #161616; --bg3: #222; --bg4: #2a2a2a;
      --border: #2a2a2a;
      --text: #e2e2e2; --text2: #666; --text3: #444;
      --accent: #4f8ef7;
    }
    html, body {
      background: transparent;
      font: 13px/1 -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none; -webkit-user-select: none;
    }
    #box {
      background: var(--bg2);
      border: 1px solid var(--bg4);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.7);
    }
    #input {
      width: 100%; height: 48px;
      background: transparent; border: none; border-bottom: 1px solid var(--border);
      padding: 0 16px; color: var(--text); font-size: 14px; font-family: inherit;
      outline: none; user-select: text; -webkit-user-select: text;
    }
    #input::placeholder { color: var(--text3); }
    #results {
      max-height: 360px; overflow-y: auto; padding: 6px;
      scrollbar-width: thin; scrollbar-color: var(--bg4) transparent;
    }
    .section {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      color: var(--text3); text-transform: uppercase;
      padding: 8px 10px 4px;
    }
    .item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 7px; cursor: default;
      transition: background 60ms;
    }
    .item.sel { background: var(--bg3); }
    .item:hover { background: var(--bg3); }
    .icon {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text2);
    }
    .icon img { width: 14px; height: 14px; border-radius: 2px; }
    .label { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sub   { font-size: 11px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .key   { font-size: 11px; color: var(--text3); background: var(--bg4); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .empty { padding: 24px; text-align: center; color: var(--text3); font-size: 12px; }
  </style>
</head>
<body>
  <div id="box">
    <input id="input" type="text" placeholder="Search tabs and commands…" spellcheck="false" autocomplete="off">
    <div id="results"></div>
  </div>
  <script src="palette.js"></script>
</body>
</html>
