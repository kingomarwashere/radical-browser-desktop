<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; user-select: none; -webkit-user-select: none;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; }
    #card {
      margin: 8px; padding: 18px 20px 16px;
      background: #1b1b1d; border: 1px solid #333; border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,.55);
      color: #e2e2e2;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 11px; color: #888; margin-bottom: 16px; word-break: break-all; }
    label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
      color: #888; margin: 10px 0 4px; }
    input {
      width: 100%; height: 32px; padding: 0 10px;
      background: #111; border: 1px solid #333; border-radius: 7px;
      color: #e2e2e2; font-size: 13px; outline: none;
    }
    input:focus { border-color: #4f8ef7; }
    .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    button {
      height: 30px; padding: 0 16px; border-radius: 7px; border: 1px solid #333;
      background: #222; color: #e2e2e2; font-size: 12px; cursor: default;
    }
    button:hover { background: #2a2a2a; }
    #ok { background: #4f8ef7; border-color: #4f8ef7; color: #0a0a0a; font-weight: 600; }
    #ok:hover { background: #3f7ee7; }
  </style>
</head>
<body>
  <div id="card">
    <h1 id="title">Sign in</h1>
    <div class="sub" id="sub"></div>
    <label>Username</label>
    <input id="user" type="text" autocomplete="off" autofocus>
    <label>Password</label>
    <input id="pass" type="password" autocomplete="off">
    <div class="row">
      <button id="cancel">Cancel</button>
      <button id="ok">Sign In</button>
    </div>
  </div>
  <script src="./auth.js"></script>
</body>
</html>
